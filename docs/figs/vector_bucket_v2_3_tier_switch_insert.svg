<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 920" width="1500" height="920" role="img" aria-label="V2.3 Phase 3 Tier Switch Insert Flow">
  <title>V2.3 Phase 3 在线升降级 Insert 流程图</title>
  <desc>Insert 在 Phase 3 不同状态下的路径：stable、dual_writing、维护窗口。</desc>
  <defs>
    <style>
      .bg { fill: #f5f7f4; }
      .title { font: 700 30px 'Segoe UI', 'PingFang SC', sans-serif; fill: #1f2d24; }
      .subtitle { font: 400 15px 'Segoe UI', 'PingFang SC', sans-serif; fill: #5a685f; }
      .lane-a { fill: #eef5f0; stroke: #4e6f5f; stroke-width: 2.5; rx: 24; ry: 24; }
      .lane-b { fill: #f4ecef; stroke: #8a4a63; stroke-width: 2.5; rx: 24; ry: 24; }
      .lane-c { fill: #f9eecf; stroke: #9d7e2e; stroke-width: 2.5; rx: 24; ry: 24; }
      .card { fill: #ffffff; stroke: #3d5449; stroke-width: 2; rx: 18; ry: 18; }
      .card-rose { fill: #ffffff; stroke: #8a4a63; stroke-width: 2; rx: 18; ry: 18; }
      .card-gold { fill: #ffffff; stroke: #8f6d39; stroke-width: 2; rx: 18; ry: 18; }
      .step { fill: #d8eadf; stroke: #4e6f5f; stroke-width: 1.5; rx: 16; ry: 16; }
      .step-rose { fill: #f2d8e2; stroke: #8a4a63; stroke-width: 1.5; rx: 16; ry: 16; }
      .step-gold { fill: #f9eecf; stroke: #9d7e2e; stroke-width: 1.5; rx: 16; ry: 16; }
      .label { font: 700 20px 'Segoe UI', 'PingFang SC', sans-serif; fill: #213229; }
      .text { font: 400 14px 'Segoe UI', 'PingFang SC', sans-serif; fill: #32433a; }
      .small { font: 400 13px 'Segoe UI', 'PingFang SC', sans-serif; fill: #5a685f; }
      .mono { font: 600 14px 'SFMono-Regular', Consolas, monospace; fill: #213229; }
      .arrow { stroke: #42594d; stroke-width: 3; fill: none; marker-end: url(#arrow); }
      .arrow-rose { stroke: #8a4a63; stroke-width: 3; fill: none; marker-end: url(#arrowRose); }
      .arrow-gold { stroke: #8f6d39; stroke-width: 3; fill: none; marker-end: url(#arrowGold); }
      .arrow-err { stroke: #a84a3e; stroke-width: 3; fill: none; stroke-dasharray: 6 6; marker-end: url(#arrowErr); }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#42594d"/>
    </marker>
    <marker id="arrowRose" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#8a4a63"/>
    </marker>
    <marker id="arrowGold" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#8f6d39"/>
    </marker>
    <marker id="arrowErr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#a84a3e"/>
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1500" height="920"/>
  <text class="title" x="50" y="58">V2.3 Phase 3 Insert 流程图（按 migrate_state 分三种路径）</text>
  <text class="subtitle" x="50" y="88">Router 先读 Metadata 的 migrate_state，再决定是单写、双写还是拒写（维护窗口）。</text>

  <rect class="lane-a" x="50" y="130" width="1400" height="230"/>
  <text class="label" x="78" y="170">路径 A：stable（无迁移）</text>
  <rect class="step" x="290" y="144" width="140" height="28"/><text class="small" x="314" y="163">最常见路径</text>

  <rect class="card" x="80" y="210" width="200" height="100"/>
  <text class="label" x="108" y="248">Client</text>
  <text class="text" x="108" y="278">PutVectors</text>

  <rect class="card" x="330" y="210" width="220" height="100"/>
  <text class="label" x="358" y="248">Gateway</text>
  <text class="text" x="358" y="278">鉴权 + 配额</text>

  <rect class="card" x="600" y="210" width="240" height="100"/>
  <text class="label" x="628" y="248">Namespace Router</text>
  <text class="text" x="628" y="278">Metadata: state = stable</text>

  <rect class="card" x="890" y="210" width="240" height="100"/>
  <text class="label" x="918" y="248">Milvus Adapter</text>
  <text class="text" x="918" y="278">Insert(src_collection)</text>

  <rect class="card" x="1180" y="210" width="240" height="100"/>
  <text class="label" x="1208" y="248">src collection</text>
  <text class="text" x="1208" y="278">IVF_SQ8 或 HNSW</text>

  <path class="arrow" d="M 280 260 L 330 260"/>
  <path class="arrow" d="M 550 260 L 600 260"/>
  <path class="arrow" d="M 840 260 L 890 260"/>
  <path class="arrow" d="M 1130 260 L 1180 260"/>

  <rect class="lane-b" x="50" y="380" width="1400" height="260"/>
  <text class="label" x="78" y="420">路径 B：dual_writing（Phase 3b 在线双写）</text>
  <rect class="step-rose" x="460" y="394" width="150" height="28"/><text class="small" x="484" y="413">迁移中</text>

  <rect class="card-rose" x="80" y="460" width="200" height="100"/>
  <text class="label" x="108" y="498">Client</text>
  <text class="text" x="108" y="528">PutVectors</text>

  <rect class="card-rose" x="330" y="460" width="220" height="100"/>
  <text class="label" x="358" y="498">Router</text>
  <text class="text" x="358" y="528">state = dual_writing</text>

  <rect class="card-rose" x="600" y="460" width="240" height="100"/>
  <text class="label" x="628" y="498">Milvus Adapter</text>
  <text class="text" x="628" y="528">Insert(src) →</text>
  <text class="text" x="628" y="552">Insert(dst)</text>

  <rect class="card-rose" x="890" y="420" width="240" height="90"/>
  <text class="label" x="918" y="456">src (权威)</text>
  <text class="text" x="918" y="486">成功即成功</text>

  <rect class="card-rose" x="890" y="540" width="240" height="90"/>
  <text class="label" x="918" y="576">dst (异步补偿)</text>
  <text class="text" x="918" y="606">失败入 reconcile 队列</text>

  <rect class="card-rose" x="1180" y="460" width="240" height="100"/>
  <text class="label" x="1208" y="498">Reconcile Job</text>
  <text class="text" x="1208" y="528">后台扫描差异</text>
  <text class="text" x="1208" y="552">按 id 回补</text>

  <path class="arrow-rose" d="M 280 510 L 330 510"/>
  <path class="arrow-rose" d="M 550 510 L 600 510"/>
  <path class="arrow-rose" d="M 840 490 L 890 465"/>
  <path class="arrow-rose" d="M 840 525 L 890 580"/>
  <path class="arrow-rose" d="M 1130 580 L 1180 510"/>

  <rect class="lane-c" x="50" y="660" width="1400" height="200"/>
  <text class="label" x="78" y="700">路径 C：维护窗口（Phase 3a 简化方案）</text>
  <rect class="step-gold" x="480" y="674" width="150" height="28"/><text class="small" x="504" y="693">禁写</text>

  <rect class="card-gold" x="80" y="730" width="200" height="100"/>
  <text class="label" x="108" y="768">Client</text>
  <text class="text" x="108" y="798">PutVectors</text>

  <rect class="card-gold" x="330" y="730" width="220" height="100"/>
  <text class="label" x="358" y="768">Router</text>
  <text class="text" x="358" y="798">state ∈ {upgrading, ...}</text>

  <rect class="card-gold" x="600" y="730" width="240" height="100"/>
  <text class="label" x="628" y="768">拦截</text>
  <text class="text" x="628" y="798">返回 503</text>
  <text class="text" x="628" y="822">Retry-After</text>

  <rect class="card-gold" x="890" y="730" width="240" height="100"/>
  <text class="label" x="918" y="768">Client 重试</text>
  <text class="text" x="918" y="798">等迁移完成后</text>
  <text class="text" x="918" y="822">正常写入</text>

  <rect class="card-gold" x="1180" y="730" width="240" height="100"/>
  <text class="label" x="1208" y="768">Coordinator</text>
  <text class="text" x="1208" y="798">完成 cutover</text>
  <text class="text" x="1208" y="822">解除维护态</text>

  <path class="arrow-gold" d="M 280 780 L 330 780"/>
  <path class="arrow-gold" d="M 550 780 L 600 780"/>
  <path class="arrow-err" d="M 840 780 L 890 780"/>
  <path class="arrow-gold" d="M 1130 780 L 1180 780"/>

  <rect class="step-gold" x="50" y="880" width="1400" height="32"/>
  <text class="small" x="74" y="902">一句话：stable 走单写；dual_writing 双写且源为权威，dst 失败异步补偿；维护窗口期间返回 503 让客户端重试。</text>
</svg>
