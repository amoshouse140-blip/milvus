<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1450 900" width="1450" height="900" role="img" aria-label="Phase 4 Query Flow">
  <title>Phase 4 Query Flow</title>
  <defs>
    <style>
      .bg{fill:#f6f7f4}.laneA{fill:#eef5f0}.laneB{fill:#eef1fb}.laneC{fill:#faf2e3}.laneD{fill:#f1efe8}.sep{stroke:#bcc9c0;stroke-width:2}
      .head{font:700 18px 'Segoe UI','PingFang SC',sans-serif;fill:#223229}.title{font:700 28px 'Segoe UI','PingFang SC',sans-serif;fill:#1f2d24}.sub{font:400 15px 'Segoe UI','PingFang SC',sans-serif;fill:#59675e}
      .box{fill:#fff;stroke:#41584d;stroke-width:2;rx:16;ry:16}.boxb{fill:#fff;stroke:#5b6f9a;stroke-width:2;rx:16;ry:16}.boxg{fill:#fffdfa;stroke:#8f6d39;stroke-width:2;rx:16;ry:16}.boxd{fill:#fff;stroke:#6d6655;stroke-width:2;rx:16;ry:16}.dec{fill:#fff8ea;stroke:#9c7f36;stroke-width:2}
      .step{font:700 15px 'Segoe UI','PingFang SC',sans-serif;fill:#223229}.text{font:400 14px 'Segoe UI','PingFang SC',sans-serif;fill:#32433a}.small{font:400 13px 'Segoe UI','PingFang SC',sans-serif;fill:#5a685f}
      .arrow{stroke:#42594d;stroke-width:3;fill:none;marker-end:url(#a)}.dash{stroke:#6c8175;stroke-width:2.5;fill:none;stroke-dasharray:8 8;marker-end:url(#b)}
    </style>
    <marker id="a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M0 0 L10 5 L0 10 z" fill="#42594d"/></marker>
    <marker id="b" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M0 0 L10 5 L0 10 z" fill="#6c8175"/></marker>
  </defs>
  <rect class="bg" width="1450" height="900"/>
  <text class="title" x="48" y="56">Phase 4 Query 流程图（概念）</text>
  <text class="sub" x="48" y="84">研究阶段的查询可能先选 profile，再决定走 HNSW、IVF、DISKANN，甚至是更弱加载约束的 cold lazy path。</text>
  <rect class="laneA" x="40" y="120" width="300" height="740"/><rect class="laneB" x="340" y="120" width="520" height="740"/><rect class="laneC" x="860" y="120" width="340" height="740"/><rect class="laneD" x="1200" y="120" width="210" height="740"/>
  <line class="sep" x1="340" y1="120" x2="340" y2="860"/><line class="sep" x1="860" y1="120" x2="860" y2="860"/><line class="sep" x1="1200" y1="120" x2="1200" y2="860"/>
  <text class="head" x="120" y="152">新增控制面</text><text class="head" x="580" y="152">Milvus / 新执行层</text><text class="head" x="922" y="152">Milvus 底座对象存储</text><text class="head" x="1244" y="152">本地高速盘</text>
  <rect class="box" x="70" y="220" width="240" height="64"/><text class="step" x="88" y="252">1. QueryVectors(bucket, collection)</text><text class="text" x="92" y="274">对外接口仍保持稳定</text>
  <rect class="box" x="70" y="330" width="240" height="92"/><text class="step" x="92" y="362">2. 选 active read profile</text><text class="text" x="92" y="384">hot / standard / diskann / lazy</text><text class="text" x="92" y="406">由策略器动态决定</text>
  <polygon class="dec" points="190,480 290,540 190,600 90,540"/><text class="step" x="130" y="538">3. 走哪条读路径？</text>
  <rect class="boxb" x="420" y="240" width="340" height="96"/><text class="step" x="446" y="272">4A. hot path</text><text class="text" x="446" y="294">HNSW / 常驻热层 / 低延迟</text><text class="text" x="446" y="316">类似 Phase 3 performance tier</text>
  <rect class="boxb" x="420" y="400" width="340" height="96"/><text class="step" x="446" y="432">4B. standard path</text><text class="text" x="446" y="454">IVF / shared collection / mmap</text><text class="text" x="446" y="476">类似当前标准档</text>
  <rect class="boxb" x="420" y="560" width="340" height="96"/><text class="step" x="446" y="592">4C. future path</text><text class="text" x="446" y="614">DISKANN 或 lazy cold query</text><text class="text" x="446" y="636">这是研究内容，不是承诺能力</text>
  <rect class="boxg" x="910" y="420" width="240" height="106"/><text class="step" x="936" y="452">5. 统一回源到底座</text><text class="text" x="936" y="474">不管哪个 profile，底座对象存储都仍是源</text><text class="text" x="936" y="496">只是访问方式不同</text>
  <rect class="boxd" x="1230" y="420" width="150" height="106"/><text class="step" x="1252" y="452">6. 本地工作集</text><text class="text" x="1252" y="474">RAM / mmap / disk</text><text class="text" x="1252" y="496">由 profile 决定</text>
  <rect class="box" x="70" y="740" width="240" height="84"/><text class="step" x="92" y="772">7. merge / return</text><text class="text" x="92" y="794">未来甚至可能多 profile 归并</text><text class="text" x="92" y="816">但这属于研究方向</text>
  <path class="arrow" d="M190 284 L190 330"/><path class="arrow" d="M190 422 L190 480"/><path class="dash" d="M290 540 L420 288"/><path class="dash" d="M290 540 L420 448"/><path class="dash" d="M290 540 L420 608"/><path class="arrow" d="M760 288 L910 420"/><path class="arrow" d="M760 448 L910 472"/><path class="arrow" d="M760 608 L910 524"/><path class="dash" d="M1150 474 L1230 474"/><path class="arrow" d="M420 736 L310 782"/>
  <text class="small" x="48" y="882">Phase 4 的 query 图强调的是“先选 profile 再执行”，而不是提前承诺某一种最终实现。</text>
</svg>
