<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1450 700" width="1450" height="700" role="img" aria-label="V2.3 Phase 2 Insert Flow">
  <title>V2.3 Phase 2 Insert 流程图</title>
  <desc>Phase 2 写入流程：Router 按 Metadata 中的 tier 路由到标准档或性能档，无双写、无迁移。</desc>
  <defs>
    <style>
      .bg { fill: #f6f7f4; }
      .laneA { fill: #eef5f0; }
      .laneB { fill: #e8eef8; }
      .sep { stroke: #bcc9c0; stroke-width: 2; }
      .title { font: 700 28px 'Segoe UI', 'PingFang SC', sans-serif; fill: #1f2d24; }
      .sub { font: 400 15px 'Segoe UI', 'PingFang SC', sans-serif; fill: #59675e; }
      .head { font: 700 18px 'Segoe UI', 'PingFang SC', sans-serif; fill: #223229; }
      .step { font: 700 15px 'Segoe UI', 'PingFang SC', sans-serif; fill: #223229; }
      .text { font: 400 14px 'Segoe UI', 'PingFang SC', sans-serif; fill: #32433a; }
      .small { font: 400 13px 'Segoe UI', 'PingFang SC', sans-serif; fill: #5a685f; }
      .box { fill: #fff; stroke: #41584d; stroke-width: 2; rx: 16; ry: 16; }
      .boxb { fill: #fff; stroke: #5b6f9a; stroke-width: 2; rx: 16; ry: 16; }
      .boxp { fill: #f3f6ff; stroke: #4d668b; stroke-width: 2; rx: 16; ry: 16; }
      .dec { fill: #fff8ea; stroke: #9c7f36; stroke-width: 2; }
      .arrow { stroke: #42594d; stroke-width: 3; fill: none; marker-end: url(#a); }
      .arrow-perf { stroke: #4d668b; stroke-width: 3; fill: none; marker-end: url(#ap); }
      .pill { fill: #f9eecf; stroke: #9d7e2e; stroke-width: 1.5; rx: 12; ry: 12; }
    </style>
    <marker id="a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#42594d"/>
    </marker>
    <marker id="ap" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#4d668b"/>
    </marker>
  </defs>

  <rect class="bg" width="1450" height="700"/>
  <text class="title" x="48" y="56">V2.3 Phase 2 Insert 流程图</text>
  <text class="sub" x="48" y="84">用户创建时已选好 tier，写入时 Router 按 Metadata 路由到对应物理 collection。无双写、无迁移。</text>

  <!-- 泳道标题 -->
  <rect class="laneA" x="40" y="120" width="1370" height="230"/>
  <text class="head" x="60" y="152">路径 A：标准档（tier = standard）</text>

  <rect class="laneB" x="40" y="370" width="1370" height="230"/>
  <text class="head" x="60" y="402">路径 B：性能档（tier = performance）</text>

  <!-- 路径 A: 标准档 -->
  <rect class="box" x="70" y="180" width="200" height="80"/>
  <text class="step" x="98" y="218">1. Client</text>
  <text class="text" x="98" y="242">PutVectors</text>

  <rect class="box" x="310" y="180" width="210" height="80"/>
  <text class="step" x="338" y="218">2. Gateway</text>
  <text class="text" x="338" y="242">鉴权 + 配额</text>

  <rect class="box" x="560" y="180" width="240" height="80"/>
  <text class="step" x="588" y="218">3. Router</text>
  <text class="text" x="588" y="242">tier=standard → vb_{b}_{lc}</text>

  <rect class="boxb" x="840" y="180" width="240" height="80"/>
  <text class="step" x="868" y="218">4. Milvus Insert</text>
  <text class="text" x="868" y="242">写入 IVF_SQ8 collection</text>

  <rect class="box" x="1120" y="180" width="250" height="80"/>
  <text class="step" x="1148" y="218">5. 异步建索引</text>
  <text class="text" x="1148" y="242">达阈值触发（同 Phase 1）</text>

  <path class="arrow" d="M 270 220 L 310 220"/>
  <path class="arrow" d="M 520 220 L 560 220"/>
  <path class="arrow" d="M 800 220 L 840 220"/>
  <path class="arrow" d="M 1080 220 L 1120 220"/>

  <!-- 路径 B: 性能档 -->
  <rect class="boxp" x="70" y="430" width="200" height="80"/>
  <text class="step" x="98" y="468">1. Client</text>
  <text class="text" x="98" y="492">PutVectors</text>

  <rect class="boxp" x="310" y="430" width="210" height="80"/>
  <text class="step" x="338" y="468">2. Gateway</text>
  <text class="text" x="338" y="492">鉴权 + max_vectors 校验</text>

  <rect class="boxp" x="560" y="430" width="240" height="80"/>
  <text class="step" x="588" y="468">3. Router</text>
  <text class="text" x="588" y="492">tier=performance → vbh_{b}_{lc}</text>

  <rect class="boxp" x="840" y="430" width="240" height="80"/>
  <text class="step" x="868" y="468">4. Milvus Insert</text>
  <text class="text" x="868" y="492">写入 HNSW collection</text>

  <rect class="boxp" x="1120" y="430" width="250" height="80"/>
  <text class="step" x="1148" y="468">5. 索引自动维护</text>
  <text class="text" x="1148" y="492">HNSW 增量更新</text>

  <path class="arrow-perf" d="M 270 470 L 310 470"/>
  <path class="arrow-perf" d="M 520 470 L 560 470"/>
  <path class="arrow-perf" d="M 800 470 L 840 470"/>
  <path class="arrow-perf" d="M 1080 470 L 1120 470"/>

  <!-- 底部说明 -->
  <rect class="pill" x="40" y="630" width="1370" height="38"/>
  <text class="small" x="64" y="654">一句话：两条路径完全独立，Router 按 Metadata 中 tier 字段路由，无双写、无交叉。标准档写入和 Phase 1 完全一致，性能档多了 max_vectors 配额校验。</text>
</svg>
