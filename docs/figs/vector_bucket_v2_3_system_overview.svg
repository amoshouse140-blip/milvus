<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 920" width="1500" height="920" role="img" aria-label="V2.3 System Overview">
  <title>V2.3 System Overview</title>
  <desc>System boundary diagram showing new components, Milvus responsibilities, JuiceFS responsibilities, and local disk responsibilities in Phase 1.</desc>
  <defs>
    <style>
      .bg { fill: #f5f7f4; }
      .title { font: 700 30px 'Segoe UI', 'PingFang SC', sans-serif; fill: #1f2d24; }
      .subtitle { font: 400 15px 'Segoe UI', 'PingFang SC', sans-serif; fill: #5a685f; }
      .zone-new { fill: #eef5f0; stroke: #4e6f5f; stroke-width: 2.5; rx: 24; ry: 24; }
      .zone-milvus { fill: #eef1fb; stroke: #5b6f9a; stroke-width: 2.5; rx: 24; ry: 24; }
      .zone-storage { fill: #faf2e3; stroke: #8f6d39; stroke-width: 2.5; rx: 24; ry: 24; }
      .zone-disk { fill: #f1efe8; stroke: #6d6655; stroke-width: 2.5; rx: 24; ry: 24; }
      .card { fill: #ffffff; stroke: #3d5449; stroke-width: 2; rx: 18; ry: 18; }
      .card-blue { fill: #ffffff; stroke: #556f9a; stroke-width: 2; rx: 18; ry: 18; }
      .card-gold { fill: #fffdfa; stroke: #8f6d39; stroke-width: 2; rx: 18; ry: 18; }
      .card-gray { fill: #ffffff; stroke: #6d6655; stroke-width: 2; rx: 18; ry: 18; }
      .pill-new { fill: #d8eadf; stroke: #4e6f5f; stroke-width: 1.5; rx: 12; ry: 12; }
      .pill-old { fill: #dbe4f5; stroke: #5b6f9a; stroke-width: 1.5; rx: 12; ry: 12; }
      .pill-note { fill: #f9eecf; stroke: #9d7e2e; stroke-width: 1.5; rx: 12; ry: 12; }
      .label { font: 700 22px 'Segoe UI', 'PingFang SC', sans-serif; fill: #213229; }
      .text { font: 400 15px 'Segoe UI', 'PingFang SC', sans-serif; fill: #32433a; }
      .small { font: 400 14px 'Segoe UI', 'PingFang SC', sans-serif; fill: #5a685f; }
      .mono { font: 600 14px 'SFMono-Regular', Consolas, monospace; fill: #213229; }
      .arrow { stroke: #42594d; stroke-width: 3; fill: none; marker-end: url(#arrow); }
      .arrow-soft { stroke: #6c8175; stroke-width: 2.5; stroke-dasharray: 8 8; fill: none; marker-end: url(#arrowSoft); }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#42594d"/>
    </marker>
    <marker id="arrowSoft" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#6c8175"/>
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1500" height="920"/>
  <text class="title" x="50" y="58">V2.3 Phase 1 系统边界图</text>
  <text class="subtitle" x="50" y="88">重点回答五个问题：哪些是新增组件、哪些复用 Milvus、哪些由 JuiceFS / 对象存储承担、哪些落在本地高速盘、挂载的到底是什么目录。</text>

  <rect class="zone-new" x="50" y="130" width="340" height="690"/>
  <text class="label" x="78" y="170">新增组件（你要开发）</text>
  <rect class="pill-new" x="250" y="144" width="106" height="28"/><text class="small" x="278" y="163">新增</text>

  <rect class="card" x="80" y="210" width="280" height="110"/>
  <text class="label" x="108" y="248">Bucket Gateway / API</text>
  <text class="text" x="108" y="278">S3-ish / SDK 接口、认证、配额</text>
  <text class="text" x="108" y="302">对用户暴露 bucket 语义</text>

  <rect class="card" x="80" y="350" width="280" height="120"/>
  <text class="label" x="108" y="388">Metadata Service</text>
  <text class="text" x="108" y="418">bucket + logical collection</text>
  <text class="text" x="108" y="442">-&gt; physical Milvus collection 映射</text>

  <rect class="card" x="80" y="500" width="280" height="120"/>
  <text class="label" x="108" y="538">Namespace Router</text>
  <text class="text" x="108" y="568">Phase 1：一个 logical collection</text>
  <text class="mono" x="108" y="592">bucket_A + col_x -&gt; phy_col_ax</text>

  <rect class="card" x="80" y="650" width="280" height="140"/>
  <text class="label" x="108" y="688">Load/Release + LRU</text>
  <text class="text" x="108" y="718">调用 LoadCollection / ReleaseCollection</text>
  <text class="text" x="108" y="742">按 TTL / LRU 控制活跃集合</text>
  <text class="text" x="108" y="766">这是产品层新增控制面</text>

  <rect class="zone-milvus" x="430" y="130" width="470" height="690"/>
  <text class="label" x="458" y="170">Milvus（复用现有能力）</text>
  <rect class="pill-old" x="760" y="144" width="106" height="28"/><text class="small" x="788" y="163">复用</text>

  <rect class="card-blue" x="460" y="210" width="410" height="110"/>
  <text class="label" x="488" y="248">Proxy / Coord / QueryNode / DataNode</text>
  <text class="text" x="488" y="278">Milvus 负责写入链路、segment 生命周期、load/release、搜索执行</text>
  <text class="text" x="488" y="302">不是你新增的组件</text>

  <rect class="card-blue" x="460" y="350" width="410" height="120"/>
  <text class="label" x="488" y="388">Collection + Index</text>
  <text class="text" x="488" y="418">Phase 1：每个 logical collection</text>
  <text class="text" x="488" y="442">对应一个 physical Milvus collection</text>

  <rect class="card-blue" x="460" y="500" width="410" height="120"/>
  <text class="label" x="488" y="538">Search / Query Execution</text>
  <text class="text" x="488" y="568">执行 QueryVectors(bucket, collection, ...)</text>
  <text class="text" x="488" y="592">是否 load 是 Milvus 硬约束</text>

  <rect class="card-blue" x="460" y="650" width="410" height="140"/>
  <text class="label" x="488" y="688">mmap + Chunk Manager</text>
  <text class="text" x="488" y="718">Milvus 负责索引/字段 mmap、chunk 访问、页缓存交互</text>
  <text class="text" x="488" y="742">需要显式配置，不是默认就生效</text>
  <text class="mono" x="488" y="766">queryNode.mmap.vectorIndex / mmap.enabled</text>

  <rect class="zone-storage" x="940" y="130" width="300" height="690"/>
  <text class="label" x="968" y="170">JuiceFS / 对象存储</text>
  <rect class="pill-old" x="1100" y="144" width="106" height="28"/><text class="small" x="1128" y="163">现有底座</text>

  <rect class="card-gold" x="970" y="210" width="240" height="120"/>
  <text class="label" x="998" y="248">权威存储</text>
  <text class="text" x="998" y="278">binlog / index artifact / segment files</text>
  <text class="text" x="998" y="302">Milvus 最终都写回这里</text>

  <rect class="card-gold" x="970" y="360" width="240" height="120"/>
  <text class="label" x="998" y="398">Bucket 底座</text>
  <text class="text" x="998" y="428">例：挂载目录 `/mnt/jfs/milvus-root`</text>
  <text class="text" x="998" y="452">不是 Phase 1 的查询引擎</text>

  <rect class="card-gold" x="970" y="510" width="240" height="150"/>
  <text class="label" x="998" y="548">它不负责</text>
  <text class="text" x="998" y="578">- bucket / collection API</text>
  <text class="text" x="998" y="602">- 逻辑路由</text>
  <text class="text" x="998" y="626">- LoadCollection 管控</text>

  <rect class="zone-disk" x="1280" y="130" width="170" height="690"/>
  <text class="label" x="1308" y="170">本地高速盘</text>
  <rect class="pill-note" x="1312" y="144" width="106" height="28"/><text class="small" x="1338" y="163">新增挂载</text>

  <rect class="card-gray" x="1305" y="210" width="120" height="120"/>
  <text class="label" x="1325" y="248">mmap Path</text>
  <text class="text" x="1325" y="278">例：`/mnt/localssd/mmap`</text>
  <text class="text" x="1325" y="302">vector index/field mmap</text>

  <rect class="card-gray" x="1305" y="360" width="120" height="140"/>
  <text class="label" x="1325" y="398">Chunk Cache</text>
  <text class="text" x="1325" y="428">例：`/mnt/localssd/chunk-cache`</text>
  <text class="text" x="1325" y="452">供 Milvus 本地缓存</text>
  <text class="text" x="1325" y="476">不是业务接口层</text>

  <rect class="card-gray" x="1305" y="530" width="120" height="150"/>
  <text class="label" x="1325" y="568">Page Cache</text>
  <text class="text" x="1325" y="598">最终由 OS 决定</text>
  <text class="text" x="1325" y="622">命中率影响 RAM</text>
  <text class="text" x="1325" y="646">和尾延迟</text>

  <path class="arrow" d="M 360 265 L 460 265"/>
  <path class="arrow" d="M 360 430 L 460 430"/>
  <path class="arrow" d="M 360 560 L 460 560"/>
  <path class="arrow" d="M 360 720 L 460 720"/>
  <path class="arrow" d="M 870 260 L 970 260"/>
  <path class="arrow" d="M 870 430 L 970 430"/>
  <path class="arrow-soft" d="M 870 720 L 1305 720"/>
  <path class="arrow-soft" d="M 1210 430 L 1305 430"/>

  <rect class="pill-note" x="50" y="845" width="1390" height="38"/>
  <text class="small" x="74" y="869">一句话：新增的是 bucket + logical collection 控制面和 load/release 编排；Milvus 继续负责向量库核心执行；JuiceFS 挂载目录负责权威存储；本地高速盘挂载目录负责 mmap / chunk cache / page cache 工作集。</text>
</svg>
