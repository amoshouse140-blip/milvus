<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1450 860" width="1450" height="860" role="img" aria-label="Phase 4 Insert Flow">
  <title>Phase 4 Insert Flow</title>
  <defs>
    <style>
      .bg{fill:#f6f7f4}.laneA{fill:#eef5f0}.laneB{fill:#eef1fb}.laneC{fill:#faf2e3}.laneD{fill:#f1efe8}.sep{stroke:#bcc9c0;stroke-width:2}
      .head{font:700 18px 'Segoe UI','PingFang SC',sans-serif;fill:#223229}.title{font:700 28px 'Segoe UI','PingFang SC',sans-serif;fill:#1f2d24}.sub{font:400 15px 'Segoe UI','PingFang SC',sans-serif;fill:#59675e}
      .box{fill:#fff;stroke:#41584d;stroke-width:2;rx:16;ry:16}.boxb{fill:#fff;stroke:#5b6f9a;stroke-width:2;rx:16;ry:16}.boxg{fill:#fffdfa;stroke:#8f6d39;stroke-width:2;rx:16;ry:16}.boxd{fill:#fff;stroke:#6d6655;stroke-width:2;rx:16;ry:16}
      .step{font:700 15px 'Segoe UI','PingFang SC',sans-serif;fill:#223229}.text{font:400 14px 'Segoe UI','PingFang SC',sans-serif;fill:#32433a}.small{font:400 13px 'Segoe UI','PingFang SC',sans-serif;fill:#5a685f}
      .arrow{stroke:#42594d;stroke-width:3;fill:none;marker-end:url(#a)}.dash{stroke:#6c8175;stroke-width:2.5;fill:none;stroke-dasharray:8 8;marker-end:url(#b)}
    </style>
    <marker id="a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M0 0 L10 5 L0 10 z" fill="#42594d"/></marker>
    <marker id="b" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M0 0 L10 5 L0 10 z" fill="#6c8175"/></marker>
  </defs>
  <rect class="bg" width="1450" height="860"/>
  <text class="title" x="48" y="56">Phase 4 Insert 流程图（概念）</text>
  <text class="sub" x="48" y="84">研究阶段的写入不再只更新一个后端，而是可能进入多 profile 或冷热多层的后台构建链路。</text>
  <rect class="laneA" x="40" y="120" width="300" height="700"/><rect class="laneB" x="340" y="120" width="520" height="700"/><rect class="laneC" x="860" y="120" width="340" height="700"/><rect class="laneD" x="1200" y="120" width="210" height="700"/>
  <line class="sep" x1="340" y1="120" x2="340" y2="820"/><line class="sep" x1="860" y1="120" x2="860" y2="820"/><line class="sep" x1="1200" y1="120" x2="1200" y2="820"/>
  <text class="head" x="120" y="152">新增控制面</text><text class="head" x="580" y="152">Milvus / 新执行层</text><text class="head" x="922" y="152">Milvus 底座对象存储</text><text class="head" x="1244" y="152">本地高速盘</text>
  <rect class="box" x="70" y="220" width="240" height="64"/><text class="step" x="92" y="252">1. PutVectors(bucket, collection)</text><text class="text" x="92" y="274">对外接口保持不变</text>
  <rect class="box" x="70" y="330" width="240" height="108"/><text class="step" x="92" y="362">2. 选 active write profile</text><text class="text" x="92" y="384">delta / standard / hot / diskann</text><text class="text" x="92" y="406">可能由策略器决定</text><text class="text" x="92" y="428">不是近期承诺能力</text>
  <rect class="boxb" x="420" y="330" width="340" height="118"/><text class="step" x="446" y="362">3. 写入 active path</text><text class="text" x="446" y="384">可能先写 delta，再异步构建多个 profile</text><text class="text" x="446" y="406">也可能直接写标准档再触发后台升级</text><text class="text" x="446" y="428">实现尚未确定</text>
  <rect class="boxb" x="420" y="500" width="340" height="128"/><text class="step" x="446" y="532">4. 后台 profile build</text><text class="text" x="446" y="554">IVF / HNSW / DISKANN / lazy-cold metadata</text><text class="text" x="446" y="576">可能不再只有一个物理索引</text><text class="text" x="446" y="598">这是研究重点</text>
  <rect class="boxg" x="910" y="440" width="240" height="112"/><text class="step" x="936" y="472">5. 统一持久化到底座</text><text class="text" x="936" y="494">所有 profile 的 artifact</text><text class="text" x="936" y="516">都仍以底座对象存储为准</text>
  <rect class="boxd" x="1230" y="440" width="150" height="112"/><text class="step" x="1252" y="472">6. 本地工作集</text><text class="text" x="1252" y="494">mmap / cache / diskann</text><text class="text" x="1252" y="516">取决于最终方案</text>
  <path class="arrow" d="M190 284 L190 330"/><path class="arrow" d="M310 384 L420 384"/><path class="arrow" d="M590 448 L590 500"/><path class="arrow" d="M760 552 L910 496"/><path class="dash" d="M1150 496 L1230 496"/>
  <text class="small" x="48" y="842">这张图是研究方向图，不是交付承诺图。它的作用是说明：未来写入链路可能从“单后端”演进成“单逻辑入口 + 多物理 profile”。</text>
</svg>
