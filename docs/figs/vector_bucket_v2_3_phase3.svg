<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 920" width="1500" height="920" role="img" aria-label="V2.3 Phase 2 Architecture">
  <title>V2.3 Phase 2 性能档（创建时选档）架构图</title>
  <desc>Phase 2 新增性能档 HNSW，用户创建 logical collection 时显式选择 tier，创建后不可变。</desc>
  <defs>
    <style>
      .bg { fill: #f5f7f4; }
      .title { font: 700 30px 'Segoe UI', 'PingFang SC', sans-serif; fill: #1f2d24; }
      .subtitle { font: 400 15px 'Segoe UI', 'PingFang SC', sans-serif; fill: #5a685f; }
      .zone-new { fill: #eef5f0; stroke: #4e6f5f; stroke-width: 2.5; rx: 24; ry: 24; }
      .zone-milvus { fill: #eef1fb; stroke: #5b6f9a; stroke-width: 2.5; rx: 24; ry: 24; }
      .zone-storage { fill: #faf2e3; stroke: #8f6d39; stroke-width: 2.5; rx: 24; ry: 24; }
      .zone-disk { fill: #f1efe8; stroke: #6d6655; stroke-width: 2.5; rx: 24; ry: 24; }
      .card { fill: #ffffff; stroke: #3d5449; stroke-width: 2; rx: 18; ry: 18; }
      .card-blue { fill: #ffffff; stroke: #556f9a; stroke-width: 2; rx: 18; ry: 18; }
      .card-gold { fill: #fffdfa; stroke: #8f6d39; stroke-width: 2; rx: 18; ry: 18; }
      .card-gray { fill: #ffffff; stroke: #6d6655; stroke-width: 2; rx: 18; ry: 18; }
      .card-perf { fill: #f3f6ff; stroke: #4d668b; stroke-width: 2; rx: 18; ry: 18; }
      .pill-new { fill: #d8eadf; stroke: #4e6f5f; stroke-width: 1.5; rx: 12; ry: 12; }
      .pill-old { fill: #dbe4f5; stroke: #5b6f9a; stroke-width: 1.5; rx: 12; ry: 12; }
      .pill-note { fill: #f9eecf; stroke: #9d7e2e; stroke-width: 1.5; rx: 12; ry: 12; }
      .label { font: 700 22px 'Segoe UI', 'PingFang SC', sans-serif; fill: #213229; }
      .text { font: 400 15px 'Segoe UI', 'PingFang SC', sans-serif; fill: #32433a; }
      .small { font: 400 14px 'Segoe UI', 'PingFang SC', sans-serif; fill: #5a685f; }
      .mono { font: 600 14px 'SFMono-Regular', Consolas, monospace; fill: #213229; }
      .arrow { stroke: #42594d; stroke-width: 3; fill: none; marker-end: url(#arrow); }
      .arrow-soft { stroke: #6c8175; stroke-width: 2.5; stroke-dasharray: 8 8; fill: none; marker-end: url(#arrowSoft); }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#42594d"/>
    </marker>
    <marker id="arrowSoft" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#6c8175"/>
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1500" height="920"/>
  <text class="title" x="50" y="58">V2.3 Phase 2 性能档架构图（创建时选档）</text>
  <text class="subtitle" x="50" y="88">用户创建 logical collection 时显式选择 tier（standard / performance），创建后不可变。不做升降级、不做热度统计。</text>

  <!-- 新增控制面 -->
  <rect class="zone-new" x="50" y="130" width="340" height="690"/>
  <text class="label" x="78" y="170">新增控制面</text>
  <rect class="pill-new" x="250" y="144" width="106" height="28"/><text class="small" x="265" y="163">Phase 2 变化</text>

  <rect class="card" x="80" y="210" width="280" height="120"/>
  <text class="label" x="108" y="248">Bucket Gateway / API</text>
  <text class="text" x="108" y="278">CreateCollection 新增 tier 参数</text>
  <text class="text" x="108" y="302">用户显式选 standard / performance</text>

  <rect class="card" x="80" y="360" width="280" height="120"/>
  <text class="label" x="108" y="398">Metadata Service</text>
  <text class="text" x="108" y="428">记录 tier（创建后不可变）</text>
  <text class="text" x="108" y="452">记录 max_vectors（性能档配额）</text>

  <rect class="card" x="80" y="510" width="280" height="120"/>
  <text class="label" x="108" y="548">Namespace Router</text>
  <text class="text" x="108" y="578">按 tier 路由到不同物理 collection</text>
  <text class="mono" x="108" y="602">standard → vb_*  |  perf → vbh_*</text>

  <rect class="card" x="80" y="660" width="280" height="140"/>
  <text class="label" x="108" y="698">Load/Release Controller</text>
  <text class="text" x="108" y="728">标准档：LRU + TTL（同 Phase 1）</text>
  <text class="text" x="108" y="752">性能档：Pin 常驻，不受 LRU</text>
  <text class="text" x="108" y="776">预算分两块：标准 3GB / 性能 3GB</text>

  <!-- Milvus -->
  <rect class="zone-milvus" x="430" y="130" width="500" height="690"/>
  <text class="label" x="458" y="170">Milvus（两种物理 collection 并存）</text>
  <rect class="pill-old" x="790" y="144" width="106" height="28"/><text class="small" x="818" y="163">复用</text>

  <rect class="card-blue" x="460" y="210" width="220" height="140"/>
  <text class="label" x="488" y="248">标准档 collection</text>
  <text class="mono" x="488" y="278">vb_{b}_{lc}</text>
  <text class="text" x="488" y="308">IVF_SQ8 + mmap</text>
  <text class="text" x="488" y="332">按需 load + LRU</text>

  <rect class="card-perf" x="700" y="210" width="220" height="140"/>
  <text class="label" x="728" y="248">性能档 collection</text>
  <text class="mono" x="728" y="278">vbh_{b}_{lc}</text>
  <text class="text" x="728" y="308">HNSW (M=16)</text>
  <text class="text" x="728" y="332">load 常驻（Pin）</text>

  <rect class="card-blue" x="460" y="380" width="460" height="120"/>
  <text class="label" x="488" y="418">预算校验</text>
  <text class="text" x="488" y="448">创建性能档时检查：pinned_sum + est &lt; budget</text>
  <text class="text" x="488" y="472">超预算拒绝创建（429）</text>

  <rect class="card-blue" x="460" y="530" width="460" height="110"/>
  <text class="label" x="488" y="568">Search / Query Execution</text>
  <text class="text" x="488" y="598">标准档：Search(IVF_SQ8) sub-second</text>
  <text class="text" x="488" y="622">性能档：Search(HNSW) ms 级</text>

  <rect class="card-blue" x="460" y="670" width="460" height="130"/>
  <text class="label" x="488" y="708">明确不做</text>
  <text class="text" x="488" y="738">❌ 运行时 tier 切换</text>
  <text class="text" x="488" y="762">❌ 热度统计 / 自动毕业 / 自动降级</text>
  <text class="text" x="488" y="786">❌ 双写 / 迁移</text>

  <!-- 存储 -->
  <rect class="zone-storage" x="970" y="130" width="270" height="690"/>
  <text class="label" x="998" y="170">底座对象存储</text>
  <rect class="pill-old" x="1100" y="144" width="106" height="28"/><text class="small" x="1128" y="163">JuiceFS</text>

  <rect class="card-gold" x="1000" y="210" width="210" height="120"/>
  <text class="label" x="1028" y="248">两种 collection</text>
  <text class="text" x="1028" y="278">标准档 + 性能档</text>
  <text class="text" x="1028" y="302">各自独立索引文件</text>

  <rect class="card-gold" x="1000" y="360" width="210" height="100"/>
  <text class="label" x="1028" y="398">挂载目录</text>
  <text class="mono" x="1028" y="428">/mnt/jfs/milvus-root</text>

  <!-- 本地盘 -->
  <rect class="zone-disk" x="1280" y="130" width="170" height="690"/>
  <text class="label" x="1308" y="170">本地高速盘</text>

  <rect class="card-gray" x="1305" y="210" width="120" height="120"/>
  <text class="label" x="1325" y="248">mmap</text>
  <text class="text" x="1325" y="278">标准档索引</text>
  <text class="text" x="1325" y="302">mmap 映射</text>

  <rect class="card-gray" x="1305" y="360" width="120" height="120"/>
  <text class="label" x="1325" y="398">chunk cache</text>
  <text class="text" x="1325" y="428">标准档读缓存</text>

  <rect class="card-gray" x="1305" y="510" width="120" height="100"/>
  <text class="label" x="1325" y="548">RAM</text>
  <text class="text" x="1325" y="578">性能档 HNSW</text>
  <text class="text" x="1325" y="602">常驻索引</text>

  <!-- 箭头 -->
  <path class="arrow" d="M 360 265 L 460 265"/>
  <path class="arrow" d="M 360 265 L 700 265"/>
  <path class="arrow" d="M 360 420 L 460 420"/>
  <path class="arrow" d="M 360 570 L 460 570"/>
  <path class="arrow" d="M 360 730 L 460 730"/>
  <path class="arrow" d="M 920 265 L 1000 265"/>
  <path class="arrow" d="M 920 400 L 1000 400"/>
  <path class="arrow-soft" d="M 920 580 L 1305 580"/>
  <path class="arrow-soft" d="M 1210 280 L 1305 280"/>
  <path class="arrow-soft" d="M 1210 400 L 1305 400"/>

  <rect class="pill-note" x="50" y="845" width="1390" height="38"/>
  <text class="small" x="74" y="869">一句话：Phase 2 = Phase 1 + 性能档。用户创建时选 tier，创建后不可变。标准档沿用 Phase 1（IVF_SQ8 + LRU），性能档新增（HNSW + Pin 常驻）。不做 tier 切换、热度统计、升降级。</text>
</svg>
